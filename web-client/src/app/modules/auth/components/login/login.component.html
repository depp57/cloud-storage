<div id="main-container">
  <mat-card class="login-card">

    <mat-card-header class="center-text">
      <div mat-card-avatar class="login-header-image"></div>
      <mat-card-title class="app-name">Cloud-Storage</mat-card-title>
    </mat-card-header>

    <h1 class="text-important">Connexion</h1>

    <mat-card-content>
      <app-login-form (loading)="setLoading($event)"></app-login-form>
    </mat-card-content>

    <mat-card-footer *ngIf="loading">
      <mat-progress-bar mode="indeterminate"></mat-progress-bar>
    </mat-card-footer>

  </mat-card>
</div>
