<div class="login-form-container">
  <form id="login-form" [formGroup]="loginForm">

    <div class="username-input-container">
      <mat-form-field appearance="fill" class="fit-width">
        <mat-label>Entrer votre nom d'utilisateur</mat-label>
        <input matInput autocomplete="username" formControlName="username" required>
        <mat-error *ngIf="username?.invalid">{{usernameErrorMessage}}</mat-error>
      </mat-form-field>
    </div>

    <div class="password-input-container">
      <mat-form-field appearance="fill" class="fit-width">
        <mat-label>Entrer votre mot de passe</mat-label>
        <input matInput [type]="hide ? 'password' : 'text'" autocomplete="current-password" formControlName="password" required>

        <button mat-icon-button matSuffix (click)="hide = !hide" [attr.aria-label]="'Masquer le mdp'" [attr.aria-pressed]="hide">
          <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
        </button>

        <mat-error *ngIf="password?.invalid">{{passwordErrorMessage}}</mat-error>
      </mat-form-field>
    </div>

    <button mat-raised-button color="primary" [disabled]="loginForm.invalid" type="submit" (click)="onSignIn()" class="submit-button">Se connecter</button>
  </form>
</div>
